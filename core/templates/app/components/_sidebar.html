{% comment %} TODO: Make a button for toggling the sidebar in smaller screen {% endcomment %}

<aside class="fixed top-0 left-0 z-40 w-64 h-screen overflow-y-scroll bg-black text-white flex flex-col justify-between p-6 transition-transform -translate-x-full lg:translate-x-0 border-r border-neutral-900" id="sidebar-nav">
  <div>
    <div class="flex items-center gap-3 pb-6 mb-8 border-b border-neutral-800">
      <div class="w-8 h-8 bg-white text-black flex items-center justify-center rounded font-black text-lg">Ω</div>
      <span class="text-sm font-bold tracking-widest uppercase">Time Clock</span>
    </div>

    <nav class="space-y-6">
      <div>
        <ul class="space-y-1">
          <li>
            <a href="{% url 'core:dashboard' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-md bg-white text-black font-semibold text-sm transition-colors">
              <i class="fa-solid fa-chart-pie w-5 text-center"></i>
              <span>Dashboard</span>
            </a>
          </li>
        </ul>
      </div>

      <div>
        <span class="px-3 text-xxs font-semibold uppercase tracking-wider text-neutral-500 block mb-2">Time Track</span>
        <ul class="space-y-1">
          <li>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-neutral-400 hover:text-white hover:bg-neutral-900 font-medium text-sm transition-colors">
              <i class="fa-solid fa-users w-5 text-center"></i>
              <span>Clock in / out</span>
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-neutral-400 hover:text-white hover:bg-neutral-900 font-medium text-sm transition-colors">
              <i class="fa-solid fa-sitemap w-5 text-center"></i>
              <span>Time off Request</span>
            </a>
          </li>
        </ul>
      </div>

      {% if user.role == 'Manager' %}
        <div>
          <span class="px-3 text-xxs font-semibold uppercase tracking-wider text-neutral-500 block mb-2">Management</span>
          <ul class="space-y-1">
            <li>
              <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-neutral-400 hover:text-white hover:bg-neutral-900 font-medium text-sm transition-colors">
                <i class="fa-solid fa-calendar-check w-5 text-center"></i>
                <span>Punch Report</span>
              </a>
            </li>
            <li>
              <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-neutral-400 hover:text-white hover:bg-neutral-900 font-medium text-sm transition-colors">
                <i class="fa-solid fa-plane-departure w-5 text-center"></i>
                <span>Leave Requests</span>
              </a>
            </li>
            <li>
              <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-neutral-400 hover:text-white hover:bg-neutral-900 font-medium text-sm transition-colors">
                <i class="fa-solid fa-file-invoice-dollar w-5 text-center"></i>
                <span>Schedule</span>
              </a>
            </li>
          </ul>
        </div>
      {% endif %}

    </nav>
  </div>
</aside>
