<header class="px-4 py-4 bg-white shadow-md w-full flex items-center justify-end">
  <div class="flex flex-col space-y-4">
    <div class="flex items-center gap-3 px-2">
      <div class="w-9 h-9 rounded-full bg-neutral-800 border border-neutral-700 flex items-center justify-center font-bold text-xs text-white">
        {{ user.username }}
      </div>
      <div class="flex flex-col truncate">
        <span class="text-sm font-medium truncate">{{ user.username }}</span>
        <span class="text-xs text-neutral-500 truncate">{{ user.email }}</span>
      </div>
    </div>
  </div>

  <form method="post" action="{% url 'logout' %}" style="display: inline;">
    {% csrf_token %}
    {% include "components/button.html" with text='Log out' type='Submit' class="text-red-600 rounded-xl hover:bg-red-500/10" %}
  </form>
</header>
