{% extends "base.html" %}

{% block title %}Time Clock Management | Dashboard{% endblock title %}

{% block main_content %}
  <main class="h-screen flex flex-col justify-center px-8 bg-gray-200">
    {{ user.username }}

    <form method="post" action="{% url 'logout' %}" style="display: inline;">
      {% csrf_token %}
      <button type="submit" class="bg-red-600 text-white rounded-sm p-2 w-fit">
        Log Out
      </button>
    </form>
  </main>
{% endblock %}
