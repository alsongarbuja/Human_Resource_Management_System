{% comment %} Component for reusable button with different state and styling {% endcomment %}
<button
  type={{ type|default:'button' }}
  id={{ id|default:'button' }}
  class="rounded-sm p-2 w-full flex items-center gap-2 justify-center cursor-pointer {{ class }}"
>
  <svg id="btn-spinner" class="hidden animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none"
    viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor"
      d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042
      1.135 5.824 3 7.938l3-2.647z" />
  </svg>
  <span id='btn-text'>{{ text|default:'Button' }}</span>
</button>
