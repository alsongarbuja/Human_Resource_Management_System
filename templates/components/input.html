{% comment %} Component for reusable form field {% endcomment %}
<div class="w-full">
  {% if label %}
    <label for="{{ id }}" class="block text-sm font-medium text-gray-700 mb-1">
      {{ label }}
    </label>
  {% endif %}

  <div class="relative rounded-md shadow-sm">
    <input
      id="{{ id }}"
      name="{{ name }}"
      type="{{ type|default:'text' }}"
      placeholder="{{ placeholder }}"
      value="{{ value|default:'' }}"
      {% if required %}required{% endif %}
      class="appearance-none block w-full px-3 py-2.5 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-black focus:border-black text-sm transition duration-150"
    >
  </div>

  {% if error %}
    <p class="mt-1.5 text-sm text-red-600">{{ error }}</p>
  {% endif %}
</div>
