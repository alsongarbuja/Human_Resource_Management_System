<div class="bg-white border border-neutral-200 rounded-xl p-6 flex flex-col justify-between shadow-sm">
  <div>
    <div class="flex items-center justify-between text-neutral-400 mb-4">
      <span class="text-xs font-semibold uppercase tracking-wider">Current Pay Period Summary</span>
      <i class="fa-solid fa-file-invoice-dollar text-sm"></i>
    </div>
    <div class="space-y-1">
      <p class="text-xs font-medium text-neutral-400 uppercase tracking-tight">
        {{ pay_period_start }} – {{ pay_period_end }}
      </p>
      <span class="text-3xl font-bold tracking-tight text-neutral-900">{{ total_hours_worked|default:"72.5" }} <span class="text-sm font-normal text-neutral-500">hrs</span></span>
    </div>
  </div>
  <!-- Mini stats broken down inside the pay period card -->
  <div class="grid grid-cols-2 gap-4 border-t border-neutral-100 pt-4 mt-6 text-sm">
    <div>
      <span class="text-xs text-neutral-400 block">Regular Hours</span>
      <span class="font-semibold text-neutral-800">{{ regular_hours|default:"70.0" }}</span>
    </div>
    <div>
      <span class="text-xs text-neutral-400 block">Overtime (OT)</span>
      <span class="font-semibold text-neutral-800">{{ ot_hours|default:"2.5" }}</span>
    </div>
  </div>
</div>
